<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考试报名弹窗 - 独立页面</title>
    <!-- 引入Bootstrap样式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入Font Awesome图标 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        /* 全局居中展示背景 */
        body {
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
        }

        /* 弹窗容器独立样式 */
        .registration-modal {
            background: #fff;
            width: 100%;
            max-width: 520px;
            border-radius: 12px;
            box-shadow: 0 6px 16px 0 rgba(0, 0, 0, 0.08), 0 3px 6px -4px rgba(0, 0, 0, 0.12), 0 9px 28px 8px rgba(0, 0, 0, 0.05);
            padding: 24px;
            position: relative;
        }

        /* 顶部标题与关闭按钮 */
        .modal-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.88);
            margin: 0;
        }
        .close-icon {
            color: rgba(0, 0, 0, 0.45);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }
        .close-icon:hover {
            color: rgba(0, 0, 0, 0.88);
        }

        /* 信息文本样式 */
        .info-text {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.65);
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .phone-info {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.88);
            margin-bottom: 8px;
        }
        .unbind-link {
            color: #1677ff;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 24px;
        }
        .unbind-link:hover {
            color: #4096ff;
        }

        /* 考试列表容器 */
        .exam-list-container {
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .exam-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .exam-item:last-child {
            border-bottom: none;
        }
        .exam-item:hover {
            background-color: #fafafa;
        }

        /* 自定义复选框样式 */
        .custom-checkbox {
            width: 16px;
            height: 16px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            margin-right: 12px;
            position: relative;
            transition: all 0.2s;
            flex-shrink: 0;
            background: #fff;
        }
        .exam-item.selected .custom-checkbox {
            background-color: #1677ff;
            border-color: #1677ff;
        }
        .exam-item.selected .custom-checkbox::after {
            content: "";
            position: absolute;
            left: 4px;
            top: 1px;
            width: 5px;
            height: 9px;
            border: 2px solid #fff;
            border-top: 0;
            border-left: 0;
            transform: rotate(45deg);
        }

        .exam-name {
            flex: 1;
            font-size: 14px;
            color: rgba(0, 0, 0, 0.88);
        }

        /* 标签样式 */
        .tag {
            font-size: 12px;
            padding: 0 7px;
            border-radius: 4px;
            margin-left: 8px;
            line-height: 20px;
            height: 22px;
            display: inline-block;
        }
        .tag-hot {
            color: #ff4d4f;
            background: #fff2f0;
            border: 1px solid #ffccc7;
        }
        .tag-new {
            color: #52c41a;
            background: #f6ffed;
            border: 1px solid #b7eb8f;
        }

        /* 底部按钮 */
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .btn-base {
            padding: 4px 15px;
            font-size: 14px;
            border-radius: 6px;
            height: 32px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-cancel {
            background: #fff;
            border-color: #d9d9d9;
            color: rgba(0, 0, 0, 0.88);
        }
        .btn-cancel:hover {
            color: #4096ff;
            border-color: #4096ff;
        }
        .btn-submit {
            background: #1677ff;
            color: #fff;
            box-shadow: 0 2px 0 rgba(5, 145, 255, 0.1);
        }
        .btn-submit:hover {
            background: #4096ff;
        }
    </style>
</head>
<body>

    <div class="registration-modal">
        <!-- 顶部标题 -->
        <div class="modal-top">
            <h2 class="modal-title">2026届牛剑模考报名</h2>
            <div class="close-icon"><i class="fa fa-times"></i></div>
        </div>

        <!-- 中间内容 -->
        <div class="modal-content-inner">
            <p class="info-text">
                学员姓名（客户编号）的报名手机号，用于接受牛剑模考准考证号、考试链接短信
            </p>
            <div class="phone-info">客户手机号：199****4520</div>
            <a class="unbind-link">解绑手机号</a>

            <!-- 考试选择列表 -->
            <div class="exam-list-container">
                <div class="exam-item" data-id="1">
                    <div class="custom-checkbox"></div>
                    <span class="exam-name">2026届-TMUA 前测模考</span>
                    <span class="tag tag-hot">热门</span>
                </div>
                <div class="exam-item" data-id="2">
                    <div class="custom-checkbox"></div>
                    <span class="exam-name">2026届-PAT 专项模考</span>
                </div>
                <div class="exam-item" data-id="3">
                    <div class="custom-checkbox"></div>
                    <span class="exam-name">2026届-MAT 基础能力测试</span>
                    <span class="tag tag-new">最新</span>
                </div>
                <div class="exam-item" data-id="4">
                    <div class="custom-checkbox"></div>
                    <span class="exam-name">2026届-ENGAA 工程学模考</span>
                </div>
                <div class="exam-item" data-id="5">
                    <div class="custom-checkbox"></div>
                    <span class="exam-name">2026届-NSAA 自然科学模考</span>
                </div>
            </div>
        </div>

        <!-- 底部按钮 -->
        <div class="modal-footer">
            <button class="btn-base btn-cancel">取消</button>
            <button class="btn-base btn-submit" id="submitBtn">确定</button>
        </div>
    </div>

    <!-- 引入jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        $(document).ready(function() {
            // 点击行选中逻辑
            $('.exam-item').on('click', function() {
                $(this).toggleClass('selected');
            });

            // 关闭按钮模拟
            $('.close-icon, .btn-cancel').on('click', function() {
                if(confirm('确定要关闭报名窗口吗？')) {
                    alert('已关闭');
                }
            });

            // 提交逻辑
            $('#submitBtn').on('click', function() {
                const selectedNames = [];
                $('.exam-item.selected').each(function() {
                    selectedNames.push($(this).find('.exam-name').text());
                });

                if (selectedNames.length === 0) {
                    alert('请至少选择一门考试进行报名');
                    return;
                }

                alert('报名成功！已选科目：\n' + selectedNames.join('\n'));
            });
        });
    </script>
</body>
</html>
